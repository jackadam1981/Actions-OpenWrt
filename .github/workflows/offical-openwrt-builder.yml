name: Offical OpenWrt Builder

on:
  push:
    branches:
      - main
    paths:
      - 'targets/**'
      - '.github/workflows/offical-openwrt-builder.yml'
      - 'diy-part1.sh'
      - 'diy-part2.sh'
      - 'feeds.conf.default'
  repository_dispatch:
    types:
      - Source Code Update
  workflow_dispatch:

permissions:
  contents: write

env:
  REPO_URL: https://github.com/openwrt/openwrt
  REPO_BRANCH: master
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: .config
  TARGETS_DIR: targets
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  UPLOAD_BIN_DIR: false
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai
  # https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  list-configs:
    runs-on: ubuntu-22.04
    outputs:
      configs: ${{ steps.list.outputs.configs }}
    steps:
    - name: Checkout
      uses: actions/checkout@main

    - name: List targets (targets/<name>/.config)
      id: list
      run: |
        if [ -d "$TARGETS_DIR" ] && [ -n "$(ls -A $TARGETS_DIR 2>/dev/null)" ]; then
          configs="["
          first=1
          for t in $(ls -A "$TARGETS_DIR" 2>/dev/null); do
            [ -f "$TARGETS_DIR/$t/.config" ] || continue
            [ "$first" -eq 0 ] && configs="$configs,"
            configs="$configs\"$TARGETS_DIR/$t/.config\""
            first=0
          done
          configs="$configs]"
          if [ "$configs" = "[]" ]; then
            echo 'configs=["'"$CONFIG_FILE"'"]' >> $GITHUB_OUTPUT
          else
            echo "configs=$configs" >> $GITHUB_OUTPUT
          fi
        else
          echo 'configs=["'"$CONFIG_FILE"'"]' >> $GITHUB_OUTPUT
        fi

  build:
    needs: list-configs
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        config: ${{ fromJson(needs.list-configs.outputs.configs) }}

    steps:
    - name: Set target name and config slug
      run: |
        cfg="${{ matrix.config }}"
        if [[ "$cfg" == targets/*/.config ]]; then
          TARGET_NAME="${cfg#targets/}"
          TARGET_NAME="${TARGET_NAME%/.config}"
          echo "TARGET_NAME=$TARGET_NAME" >> $GITHUB_ENV
          echo "CONFIG_SLUG=$TARGET_NAME" >> $GITHUB_ENV
        else
          echo "TARGET_NAME=" >> $GITHUB_ENV
          echo "CONFIG_SLUG=$(echo "$cfg" | sed 's/\//-/g')" >> $GITHUB_ENV
        fi

    - name: Checkout
      uses: actions/checkout@main

    - name: Initialization environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
        sudo docker image prune --all --force
        sudo -E apt-get -qq update
        sudo -E apt-get -qq install ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential bzip2 ccache cmake cpio curl device-tree-compiler fastjar flex gawk gettext gcc-multilib g++-multilib git gperf haveged help2man intltool libc6-dev-i386 libelf-dev libfuse-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev libpython3-dev libreadline-dev libssl-dev libtool lrzsz mkisofs msmtp ninja-build p7zip p7zip-full patch pkgconf python2.7 python3 python3-pyelftools python3-setuptools qemu-utils rsync scons squashfs-tools subversion swig texinfo uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean
        sudo timedatectl set-timezone "$TZ"
        sudo mkdir -p /workdir
        sudo chown $USER:$GROUPS /workdir

    - name: Clone source code
      working-directory: /workdir
      run: |
        df -hT $PWD
        git clone $REPO_URL -b $REPO_BRANCH openwrt
        ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt

    - name: Load custom feeds
      run: |
        [ -e $FEEDS_CONF ] && mv $FEEDS_CONF openwrt/feeds.conf.default
        chmod +x $DIY_P1_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P1_SH

    - name: Update feeds
      run: cd openwrt && ./scripts/feeds update -a

    - name: Install feeds
      run: cd openwrt && ./scripts/feeds install -a

    - name: Load custom configuration
      run: |
        [ -e files ] && mv files openwrt/files
        cp '${{ matrix.config }}' openwrt/$CONFIG_FILE
        chmod +x $DIY_P2_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P2_SH

    - name: Download package
      id: package
      run: |
        cd openwrt
        make defconfig
        make download -j8
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;

    - run: |
       cd openwrt
       echo "=== TARGET ==="
       grep '^CONFIG_TARGET' .config | head -10

    - name: Compile the firmware
      id: compile
      run: |
        cd openwrt
        echo -e "$(nproc) thread compile"
        if make -j$(nproc) || make -j1 || make -j1 V=s; then
          echo "status=success" >> $GITHUB_OUTPUT
        else
          echo "status=failure" >> $GITHUB_OUTPUT
          exit 1
        fi
        grep '^CONFIG_TARGET.*DEVICE.*=y' .config | sed -r 's/.*DEVICE_(.*)=y/\1/' | head -5 || true

    - name: Check space usage
      if: (!cancelled())
      run: df -hT

    - name: Upload bin directory
      uses: actions/upload-artifact@main
      if: steps.compile.outputs.status == 'success' && env.UPLOAD_BIN_DIR == 'true'
      with:
        name: OpenWrt_bin_${{ env.CONFIG_SLUG }}
        path: openwrt/bin

    - name: Organize files
      id: organize
      if: steps.compile.outputs.status == 'success' && env.UPLOAD_FIRMWARE == 'true' && !cancelled()
      run: |
        cd openwrt/bin/targets/*/*
        rm -rf packages
        echo "FIRMWARE=$PWD" >> $GITHUB_ENV
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Upload firmware directory
      uses: actions/upload-artifact@main
      if: steps.organize.outputs.status == 'success' && !cancelled()
      with:
        name: OpenWrt_firmware_${{ env.CONFIG_SLUG }}
        path: ${{ env.FIRMWARE }}

  release:
    needs: build
    if: ${{ !cancelled() }}
    runs-on: ubuntu-22.04
    steps:
    - name: Download all firmware artifacts
      if: env.UPLOAD_RELEASE == 'true'
      uses: actions/download-artifact@main

    - name: Generate release tag
      if: env.UPLOAD_RELEASE == 'true'
      id: tag
      run: echo "release_tag=$(date +"%Y.%m.%d-%H%M")" >> $GITHUB_OUTPUT

    # Firmware: YYYYMMDD-<VERSION_NUMBER>-<rest> from version.buildinfo (e.g. 24.10.4), then strip openwrt-TARGET-SUBTARGET-.
    # Metadata / unknown patterns: <slug>_<basename>. Collisions get <slug>_ prefix.
    - name: Stage release assets
      if: env.UPLOAD_RELEASE == 'true'
      run: |
        set -euo pipefail
        rm -rf _release_assets
        mkdir -p _release_assets
        DAY=$(date -u +%Y%m%d)
        for d in OpenWrt_firmware_*; do
          [ -d "$d" ] || continue
          slug="${d#OpenWrt_firmware_}"
          OWRT_VER=""
          if [ -f "$d/version.buildinfo" ]; then
            OWRT_VER=$(head -1 "$d/version.buildinfo" | cut -d, -f1 | awk '{print $1}' | tr -cd '0-9a-zA-Z._~-')
          fi
          find "$d" -type f -print0 | while IFS= read -r -d '' f; do
            bn=$(basename "$f")
            case "$bn" in
              *.bin|*.img.gz|*.tar.gz)
                short=$(echo "$bn" | sed -E 's/^openwrt-[^-]+-[^-]+-//')
                if [ -z "$short" ] || [ "$short" = "$bn" ]; then
                  out="${slug}_${bn}"
                else
                  if [ -n "$OWRT_VER" ]; then
                    out="${DAY}-${OWRT_VER}-${short}"
                  else
                    out="${DAY}-${short}"
                  fi
                fi
                ;;
              *)
                out="${slug}_${bn}"
                ;;
            esac
            dest="_release_assets/$out"
            if [ -e "$dest" ]; then
              dest="_release_assets/${slug}_${out}"
            fi
            cp -f "$f" "$dest"
          done
        done
        ls -la _release_assets | head -80

    - name: Upload firmware to release
      if: env.UPLOAD_RELEASE == 'true'
      uses: softprops/action-gh-release@v2.6.1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ steps.tag.outputs.release_tag }}
        body: |
          Multi-config build. Firmware files: `YYYYMMDD-<OpenWrt version>-<image>.bin` (version from each target's `version.buildinfo`, e.g. 24.10.4; `openwrt-TARGET-SUBTARGET-` stripped from image name).
          Metadata files stay as `<target>_<name>`. On name clash, `<target>_` is prepended.
        files: _release_assets/*

    - name: Delete workflow runs
      uses: Mattraks/delete-workflow-runs@main
      with:
        retain_days: 0
        keep_minimum_runs: 2

    - name: Remove old Releases
      if: env.UPLOAD_RELEASE == 'true'
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        set -euo pipefail
        # Replaces archived dev-drprasad/delete-older-releases (Node 20); keep 3 newest non-draft releases.
        while IFS= read -r tag; do
          [ -z "$tag" ] && continue
          gh release delete "$tag" --repo "${{ github.repository }}" --yes --cleanup-tag
        done < <(gh release list --repo "${{ github.repository }}" --limit 200 --json tagName,isDraft \
          --jq -r '[.[] | select(.isDraft == false)] | .[3:] | .[].tagName')
