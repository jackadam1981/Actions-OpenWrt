# See /LICENSE for more information.
#

name: Update Checker

on:
  workflow_dispatch:
#  schedule:
#    - cron: 0 */18 * * *

permissions:
  contents: read
  actions: write

jobs:
  check-openwrt:
    runs-on: ubuntu-latest
    steps:
      - name: Get commit hash (openwrt/openwrt)
        id: getHash
        run: |
          # 跟踪稳定分支 tip（与 Builder 同源；用于发现上游新提交）
          git clone --depth 1 https://github.com/openwrt/openwrt -b openwrt-25.12 .
          echo "commitHash=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

      - name: Compare commit hash
        id: cacheHash
        uses: actions/cache@v4
        with:
          path: .commitHash
          key: commitHash_openwrt_${{ steps.getHash.outputs.commitHash }}

      - name: Save new commit hash
        if: steps.cacheHash.outputs.cache-hit != 'true'
        run: echo "${{ steps.getHash.outputs.commitHash }}" | tee .commitHash

      - name: Trigger OpenWrt Builder
        if: steps.cacheHash.outputs.cache-hit != 'true'
        uses: peter-evans/repository-dispatch@v4
        with:
          token: ${{ secrets.REPO_DISPATCH_PAT }}
          repository: ${{ github.repository }}
          event-type: OpenWrt Source Update

  check-immortalwrt:
    runs-on: ubuntu-latest
    steps:
      - name: Get commit hash (immortalwrt/immortalwrt)
        id: getHash
        run: |
          git clone --depth 1 https://github.com/immortalwrt/immortalwrt -b master .
          echo "commitHash=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

      - name: Compare commit hash
        id: cacheHash
        uses: actions/cache@v4
        with:
          path: .commitHash
          key: commitHash_immortalwrt_${{ steps.getHash.outputs.commitHash }}

      - name: Save new commit hash
        if: steps.cacheHash.outputs.cache-hit != 'true'
        run: echo "${{ steps.getHash.outputs.commitHash }}" | tee .commitHash

      - name: Trigger ImmortalWrt Builder
        if: steps.cacheHash.outputs.cache-hit != 'true'
        uses: peter-evans/repository-dispatch@v4
        with:
          token: ${{ secrets.REPO_DISPATCH_PAT }}
          repository: ${{ github.repository }}
          event-type: ImmortalWrt Source Update

  cleanup-runs:
    needs: [check-openwrt, check-immortalwrt]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Delete workflow runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 0
          keep_minimum_runs: 2
