# Description: Poll upstream commits; on change, repository_dispatch to trigger builders.
#
# Requires repository secret REPO_DISPATCH_PAT: classic PAT with repo scope (fine-grained:
# Contents read+write, Metadata read). Default GITHUB_TOKEN cannot start other workflows.
