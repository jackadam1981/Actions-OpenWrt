name: OpenWrt Builder

on:
  push:
    branches:
      - main
    paths:
      - 'targets/**'
      - '.github/workflows/openwrt-builder.yml'
      - 'diy-part1.sh'
      - 'diy-part2.sh'
      - 'feeds.conf.default'
  repository_dispatch:
    types:
      - OpenWrt Source Update
  workflow_dispatch:
    inputs:
      runner:
        description: 'Where to run the build job (list-configs always uses GitHub-hosted)'
        type: choice
        options:
          - github-hosted
          - self-hosted
        default: github-hosted
      baseline_only:
        description: 'If true, only build targets/_hiker-x9-baseline-only/.config (hiker_x9-minimal-baseline)'
        type: boolean
        default: false

# contents: release/tags; actions: required by Mattraks/delete-workflow-runs (delete workflow runs API).
permissions:
  contents: write
  actions: write

env:
  REPO_URL: https://github.com/openwrt/openwrt
  REPO_BRANCH: master
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: .config
  TARGETS_DIR: targets
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  UPLOAD_BIN_DIR: false
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai
  # CCACHE_DIR is set in "Prepare workdir" (must match WORKDIR).
  CCACHE_COMPRESS: 'true'
  CCACHE_MAXSIZE: 2G
  # https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  list-configs:
    runs-on: ubuntu-22.04
    outputs:
      configs: ${{ steps.list.outputs.configs }}
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: List targets (targets/<name>/.config)
      id: list
      run: |
        if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.baseline_only }}" = "true" ]; then
          echo 'configs=["'"$TARGETS_DIR"'/_hiker-x9-baseline-only/.config"]' >> $GITHUB_OUTPUT
          exit 0
        fi
        if [ -d "$TARGETS_DIR" ] && [ -n "$(ls -A $TARGETS_DIR 2>/dev/null)" ]; then
          configs="["
          first=1
          for t in $(ls -A "$TARGETS_DIR" 2>/dev/null); do
            case "$t" in
              _*) continue ;;
            esac
            [ -f "$TARGETS_DIR/$t/.config" ] || continue
            [ "$first" -eq 0 ] && configs="$configs,"
            configs="$configs\"$TARGETS_DIR/$t/.config\""
            first=0
          done
          configs="$configs]"
          if [ "$configs" = "[]" ]; then
            echo 'configs=["'"$CONFIG_FILE"'"]' >> $GITHUB_OUTPUT
          else
            echo "configs=$configs" >> $GITHUB_OUTPUT
          fi
        else
          echo 'configs=["'"$CONFIG_FILE"'"]' >> $GITHUB_OUTPUT
        fi

  build:
    needs: list-configs
    runs-on: ${{ github.event_name == 'workflow_dispatch' && inputs.runner == 'self-hosted' && fromJSON('["self-hosted", "linux", "x64"]') || 'ubuntu-22.04' }}
    strategy:
      fail-fast: false
      matrix:
        config: ${{ fromJson(needs.list-configs.outputs.configs) }}

    steps:
    - name: Set target name and config slug
      run: |
        cfg="${{ matrix.config }}"
        if [[ "$cfg" == targets/*/.config ]]; then
          TARGET_NAME="${cfg#targets/}"
          TARGET_NAME="${TARGET_NAME%/.config}"
          echo "TARGET_NAME=$TARGET_NAME" >> $GITHUB_ENV
          echo "CONFIG_SLUG=$TARGET_NAME" >> $GITHUB_ENV
        else
          echo "TARGET_NAME=" >> $GITHUB_ENV
          echo "CONFIG_SLUG=$(echo "$cfg" | sed 's/\//-/g')" >> $GITHUB_ENV
        fi

    - name: Checkout
      uses: actions/checkout@v4

    - name: Initialization environment (GitHub-hosted)
      if: runner.environment != 'self-hosted'
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
        sudo docker image prune --all --force
        sudo -E apt-get -qq update
        sudo -E apt-get -qq install ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential bzip2 ccache cmake cpio curl device-tree-compiler fastjar flex gawk gettext gcc-multilib g++-multilib git gperf haveged help2man intltool libc6-dev-i386 libelf-dev libfuse-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev libpython3-dev libreadline-dev libssl-dev libtool lrzsz mkisofs msmtp ninja-build p7zip p7zip-full patch pkgconf python2.7 python3 python3-pyelftools python3-setuptools qemu-utils rsync scons squashfs-tools subversion swig texinfo uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean

    - name: Prepare workdir (all runners)
      run: |
        set -euo pipefail
        # GitHub-hosted: passwordless sudo. Self-hosted often has no TTY / no NOPASSWD — use a user-writable tree.
        if [ "$(id -u)" -eq 0 ]; then
          mkdir -p /workdir
          WD=/workdir
        elif sudo -n true 2>/dev/null; then
          sudo timedatectl set-timezone "$TZ" || true
          sudo mkdir -p /workdir
          sudo chown "$USER:$(id -gn)" /workdir
          WD=/workdir
        else
          WD="${RUNNER_WORKSPACE:-$HOME}/openwrt-build-workdir"
          mkdir -p "$WD"
          timedatectl set-timezone "$TZ" 2>/dev/null || true
        fi
        echo "WORKDIR=$WD" >> "$GITHUB_ENV"
        echo "CCACHE_DIR=$WD/.ccache" >> "$GITHUB_ENV"

    - name: Clone or update source code
      working-directory: ${{ env.WORKDIR }}
      run: |
        df -hT $PWD
        if [ -d openwrt/.git ]; then
          cd openwrt
          git remote set-url origin "$REPO_URL"
          git fetch --depth 1 origin "$REPO_BRANCH"
          git checkout -B "$REPO_BRANCH" FETCH_HEAD
        else
          rm -rf openwrt
          git clone --depth 1 -b "$REPO_BRANCH" "$REPO_URL" openwrt
        fi
        ln -sf "$WORKDIR/openwrt" "$GITHUB_WORKSPACE/openwrt"

    - name: Restore OpenWrt dl + ccache
      uses: actions/cache/restore@v4
      with:
        path: |
          ${{ env.WORKDIR }}/openwrt/dl
          ${{ env.WORKDIR }}/.ccache
        key: openwrt-${{ env.CONFIG_SLUG }}-${{ hashFiles(matrix.config, 'feeds.conf.default', 'diy-part1.sh', 'diy-part2.sh') }}-${{ github.run_id }}-${{ strategy.job-index }}
        restore-keys: |
          openwrt-${{ env.CONFIG_SLUG }}-${{ hashFiles(matrix.config, 'feeds.conf.default', 'diy-part1.sh', 'diy-part2.sh') }}-
          openwrt-${{ env.CONFIG_SLUG }}-

    - name: Load custom feeds
      run: |
        [ -e $FEEDS_CONF ] && mv $FEEDS_CONF openwrt/feeds.conf.default
        chmod +x $DIY_P1_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P1_SH

    - name: Update feeds
      run: |
        set -euo pipefail
        cd openwrt
        # 持久化工作区里 feeds/* 偶发损坏：存在错误文件 .git/refs/heads/HEAD 时，
        # git pull 会报 "cannot lock ref 'HEAD': reference already exists"。
        fix_feeds_bad_head_ref() {
          local g
          for g in feeds/*/.git; do
            [ -e "$g" ] || continue
            if [ -f "$g/refs/heads/HEAD" ]; then
              rm -f "$g/refs/heads/HEAD"
            fi
          done
        }
        fix_feeds_bad_head_ref
        if ./scripts/feeds update -a; then
          exit 0
        fi
        echo "::warning::feeds update 首次失败，删除 feeds/packages 后重试一次"
        rm -rf feeds/packages
        fix_feeds_bad_head_ref
        ./scripts/feeds update -a

    - name: Install feeds
      run: cd openwrt && ./scripts/feeds install -a

    - name: Load custom configuration
      run: |
        [ -e files ] && mv files openwrt/files
        cp '${{ matrix.config }}' openwrt/$CONFIG_FILE
        chmod +x $DIY_P2_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P2_SH

    - name: Download package
      id: package
      run: |
        cd openwrt
        grep -q '^CONFIG_CCACHE=' .config 2>/dev/null || echo 'CONFIG_CCACHE=y' >> .config
        make defconfig
        make download -j8
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;

    - run: |
       cd openwrt
       echo "=== CONFIG_TARGET_MULTI_PROFILE & all DEVICE_* (after make defconfig) ==="
       grep -E '^CONFIG_TARGET_MULTI_PROFILE=|^CONFIG_TARGET_.*_DEVICE_.*=' .config || true
       echo "=== CONFIG_TARGET summary (first 25 lines) ==="
       grep '^CONFIG_TARGET' .config | head -25

    - name: Compile the firmware
      id: compile
      run: |
        cd openwrt
        echo -e "$(nproc) thread compile"
        if make -j$(nproc) || make -j1 || make -j1 V=s; then
          echo "status=success" >> $GITHUB_OUTPUT
        else
          echo "status=failure" >> $GITHUB_OUTPUT
          exit 1
        fi
        grep '^CONFIG_TARGET.*DEVICE.*=y' .config | sed -r 's/.*DEVICE_(.*)=y/\1/' | head -5 || true

    - name: Save OpenWrt dl + ccache
      if: (!cancelled())
      uses: actions/cache/save@v4
      with:
        path: |
          ${{ env.WORKDIR }}/openwrt/dl
          ${{ env.WORKDIR }}/.ccache
        key: openwrt-${{ env.CONFIG_SLUG }}-${{ hashFiles(matrix.config, 'feeds.conf.default', 'diy-part1.sh', 'diy-part2.sh') }}-${{ github.run_id }}-${{ strategy.job-index }}

    - name: Check space usage
      if: (!cancelled())
      run: df -hT

    - name: Upload bin directory
      uses: actions/upload-artifact@v4
      if: steps.compile.outputs.status == 'success' && env.UPLOAD_BIN_DIR == 'true'
      with:
        name: OpenWrt_bin_${{ env.CONFIG_SLUG }}
        path: openwrt/bin

    - name: Organize files
      id: organize
      if: steps.compile.outputs.status == 'success' && env.UPLOAD_FIRMWARE == 'true' && !cancelled()
      run: |
        cd openwrt/bin/targets/*/*
        rm -rf packages
        echo "FIRMWARE=$PWD" >> $GITHUB_ENV
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Upload firmware directory
      uses: actions/upload-artifact@v4
      if: steps.organize.outputs.status == 'success' && !cancelled()
      with:
        name: OpenWrt_firmware_${{ env.CONFIG_SLUG }}
        path: ${{ env.FIRMWARE }}

  release:
    needs: build
    if: ${{ !cancelled() }}
    runs-on: ubuntu-22.04
    steps:
    - name: Download all firmware artifacts
      if: env.UPLOAD_RELEASE == 'true'
      uses: actions/download-artifact@v4

    - name: Generate release tag
      if: env.UPLOAD_RELEASE == 'true'
      id: tag
      run: echo "release_tag=$(date +"%Y.%m.%d-%H%M")" >> $GITHUB_OUTPUT

    # Firmware prefix: last path segment of REPO_URL (e.g. openwrt/openwrt -> openwrt, immortalwrt/immortalwrt -> immortalwrt).
    # Strip <prefix>-TARGET-SUBTARGET-, drop leading generic-, then prefix <prefix>- on the remainder.
    # Name: YYYYMMDD-<prefix>-<rest>.bin (no version in filename).
    # Metadata / unknown patterns: <slug>_<basename>. Collisions get <slug>_ prefix.
    - name: Stage release assets
      if: env.UPLOAD_RELEASE == 'true'
      run: |
        set -euo pipefail
        rm -rf _release_assets
        mkdir -p _release_assets
        DAY=$(date -u +%Y%m%d)
        repo_path="${REPO_URL%.git}"
        FIRMWARE_PREFIX=$(echo "$repo_path" | sed -E 's#.*/##' | tr 'A-Z' 'a-z')
        if [ -z "$FIRMWARE_PREFIX" ] || [[ ! "$FIRMWARE_PREFIX" =~ ^[a-z0-9][a-z0-9._-]*$ ]]; then
          FIRMWARE_PREFIX=openwrt
        fi
        for d in OpenWrt_firmware_*; do
          [ -d "$d" ] || continue
          slug="${d#OpenWrt_firmware_}"
          find "$d" -type f -print0 | while IFS= read -r -d '' f; do
            bn=$(basename "$f")
            case "$bn" in
              *.bin|*.img.gz|*.tar.gz)
                short=$(echo "$bn" | sed -E "s/^${FIRMWARE_PREFIX}-[^-]+-[^-]+-//")
                if [ -z "$short" ] || [ "$short" = "$bn" ]; then
                  out="${slug}_${bn}"
                else
                  case "$short" in
                    generic-*) short="${short#generic-}" ;;
                  esac
                  short="${FIRMWARE_PREFIX}-${short}"
                  out="${DAY}-${short}"
                fi
                ;;
              *)
                out="${slug}_${bn}"
                ;;
            esac
            dest="_release_assets/$out"
            if [ -e "$dest" ]; then
              dest="_release_assets/${slug}_${out}"
            fi
            cp -f "$f" "$dest"
          done
        done
        ls -la _release_assets | head -80

    - name: Upload firmware to release
      if: env.UPLOAD_RELEASE == 'true'
      uses: softprops/action-gh-release@v2.6.1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ steps.tag.outputs.release_tag }}
        body: |
          Multi-config build. Firmware files: `YYYYMMDD[-<version>]-<repo>-<profile...>.bin` (`<repo>` is the GitHub repo name from `REPO_URL`, e.g. `openwrt` or `immortalwrt`; optional version from each target's `version.buildinfo`; strip `<repo>-TARGET-SUBTARGET-` and a leading `generic-`, then keep `<repo>-` on the remainder).
          Metadata files stay as `<target>_<name>`. On name clash, `<target>_` is prepended.
        files: _release_assets/*

    - name: Delete workflow runs
      uses: Mattraks/delete-workflow-runs@v2
      with:
        token: ${{ github.token }}
        repository: ${{ github.repository }}
        retain_days: 0
        keep_minimum_runs: 2

    - name: Remove old Releases
      if: env.UPLOAD_RELEASE == 'true'
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        set -euo pipefail
        # Replaces archived dev-drprasad/delete-older-releases (Node 20); keep 3 newest non-draft releases.
        while IFS= read -r tag; do
          [ -z "$tag" ] && continue
          gh release delete "$tag" --repo "${{ github.repository }}" --yes --cleanup-tag
        done < <(gh release list --repo "${{ github.repository }}" --limit 200 --json tagName,isDraft \
          --jq -r '[.[] | select(.isDraft == false)] | .[3:] | .[].tagName')
