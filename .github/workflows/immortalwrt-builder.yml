name: ImmortalWrt Builder

# 仅手动运行（不随 repository_dispatch 自动触发）
on:
  workflow_dispatch:

permissions:
  contents: write
  actions: write

env:
  REPO_URL: https://github.com/immortalwrt/immortalwrt
  REPO_BRANCH: master
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: .config
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  UPLOAD_BIN_DIR: false
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai
  # CCACHE_DIR is set dynamically in "Prepare workdir" (must match WORKDIR).
  CCACHE_COMPRESS: 'true'
  CCACHE_MAXSIZE: 2G
  # https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Initialization environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
        sudo docker image prune --all --force
        sudo -E apt-get -qq update
        sudo -E apt-get -qq install ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential bzip2 ccache cmake cpio curl device-tree-compiler fastjar flex gawk gettext gcc-multilib g++-multilib git gperf haveged help2man intltool libc6-dev-i386 libelf-dev libfuse-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev libpython3-dev libreadline-dev libssl-dev libtool lrzsz mkisofs msmtp ninja-build p7zip p7zip-full patch pkgconf python2.7 python3 python3-pyelftools python3-setuptools qemu-utils rsync scons squashfs-tools subversion swig texinfo uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean

    - name: Prepare workdir (all runners)
      run: |
        set -euo pipefail
        if [ "$(id -u)" -eq 0 ]; then
          mkdir -p /workdir
          WD=/workdir
        elif sudo -n true 2>/dev/null; then
          sudo timedatectl set-timezone "$TZ" || true
          sudo mkdir -p /workdir
          sudo chown "$USER:$(id -gn)" /workdir
          WD=/workdir
        else
          WD="${RUNNER_WORKSPACE:-$HOME}/openwrt-build-workdir"
          mkdir -p "$WD"
          timedatectl set-timezone "$TZ" 2>/dev/null || true
        fi
        echo "WORKDIR=$WD" >> "$GITHUB_ENV"
        echo "CCACHE_DIR=$WD/.ccache" >> "$GITHUB_ENV"

    - name: Clone source code
      working-directory: ${{ env.WORKDIR }}
      run: |
        df -hT $PWD
        git clone $REPO_URL -b $REPO_BRANCH openwrt
        ln -sf "$WORKDIR/openwrt" $GITHUB_WORKSPACE/openwrt

    - name: Restore OpenWrt dl + ccache
      uses: actions/cache/restore@v4
      with:
        path: |
          ${{ env.WORKDIR }}/openwrt/dl
          ${{ env.WORKDIR }}/.ccache
        key: openwrt-immortalwrt-${{ hashFiles('.config', 'feeds.conf.default', 'diy-part1.sh', 'diy-part2.sh') }}-${{ github.run_id }}
        restore-keys: |
          openwrt-immortalwrt-${{ hashFiles('.config', 'feeds.conf.default', 'diy-part1.sh', 'diy-part2.sh') }}-
          openwrt-immortalwrt-

    - name: Load custom feeds
      run: |
        [ -e $FEEDS_CONF ] && mv $FEEDS_CONF openwrt/feeds.conf.default
        chmod +x $DIY_P1_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P1_SH

    - name: Update feeds
      run: |
        set -euo pipefail
        cd openwrt
        fix_feeds_bad_head_ref() {
          local g
          for g in feeds/*/.git; do
            [ -e "$g" ] || continue
            if [ -f "$g/refs/heads/HEAD" ]; then
              rm -f "$g/refs/heads/HEAD"
            fi
          done
        }
        fix_feeds_bad_head_ref
        if ./scripts/feeds update -a; then
          exit 0
        fi
        echo "::warning::feeds update 首次失败，删除 feeds/packages 后重试一次"
        rm -rf feeds/packages
        fix_feeds_bad_head_ref
        ./scripts/feeds update -a

    - name: Install feeds
      run: cd openwrt && ./scripts/feeds install -a

    - name: Load custom configuration
      run: |
        [ -e files ] && mv files openwrt/files
        [ -e $CONFIG_FILE ] && mv $CONFIG_FILE openwrt/.config
        chmod +x $DIY_P2_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P2_SH

    - name: Download package
      id: package
      run: |
        cd openwrt
        grep -q '^CONFIG_CCACHE=' .config 2>/dev/null || echo 'CONFIG_CCACHE=y' >> .config
        make defconfig
        make download -j8
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;

    - name: Compile the firmware
      id: compile
      run: |
        cd openwrt
        echo -e "$(nproc) thread compile"
        if make -j$(nproc) || make -j1 || make -j1 V=s; then
          echo "status=success" >> $GITHUB_OUTPUT
        else
          echo "status=failure" >> $GITHUB_OUTPUT
          exit 1
        fi
        grep '^CONFIG_TARGET.*DEVICE.*=y' .config | sed -r 's/.*DEVICE_(.*)=y/\1/' > DEVICE_NAME
        [ -s DEVICE_NAME ] && echo "DEVICE_NAME=_$(cat DEVICE_NAME)" >> $GITHUB_ENV
        echo "FILE_DATE=_$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV

    - name: Save OpenWrt dl + ccache
      if: (!cancelled())
      uses: actions/cache/save@v4
      with:
        path: |
          ${{ env.WORKDIR }}/openwrt/dl
          ${{ env.WORKDIR }}/.ccache
        key: openwrt-immortalwrt-${{ hashFiles('.config', 'feeds.conf.default', 'diy-part1.sh', 'diy-part2.sh') }}-${{ github.run_id }}

    - name: Check space usage
      if: (!cancelled())
      run: df -hT

    - name: Upload bin directory
      uses: actions/upload-artifact@v4
      if: steps.compile.outputs.status == 'success' && env.UPLOAD_BIN_DIR == 'true'
      with:
        name: OpenWrt_bin${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
        path: openwrt/bin

    - name: Organize files
      id: organize
      if: steps.compile.outputs.status == 'success' && env.UPLOAD_FIRMWARE == 'true' && !cancelled()
      run: |
        cd openwrt/bin/targets/*/*
        rm -rf packages
        echo "FIRMWARE=$PWD" >> $GITHUB_ENV
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Upload firmware directory
      uses: actions/upload-artifact@v4
      if: steps.organize.outputs.status == 'success' && !cancelled()
      with:
        name: OpenWrt_firmware${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
        path: ${{ env.FIRMWARE }}

    - name: Generate release tag
      id: tag
      if: steps.compile.outputs.status == 'success' && env.UPLOAD_RELEASE == 'true' && !cancelled()
      run: |
        echo "release_tag=$(date +"%Y.%m.%d-%H%M")" >> $GITHUB_OUTPUT
        echo "ImmortalWrt build. Firmware assets below." > release.txt
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Upload firmware to release
      uses: softprops/action-gh-release@v2.6.1
      if: steps.compile.outputs.status == 'success' && steps.tag.outputs.status == 'success' && !cancelled()
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ steps.tag.outputs.release_tag }}
        body_path: release.txt
        files: ${{ env.FIRMWARE }}/*

    - name: Delete workflow runs
      uses: Mattraks/delete-workflow-runs@v2
      with:
        token: ${{ github.token }}
        repository: ${{ github.repository }}
        retain_days: 0
        keep_minimum_runs: 2

    - name: Remove old Releases
      if: steps.compile.outputs.status == 'success' && env.UPLOAD_RELEASE == 'true' && !cancelled()
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        set -euo pipefail
        # Replaces archived dev-drprasad/delete-older-releases (Node 20); keep 3 newest non-draft releases.
        while IFS= read -r tag; do
          [ -z "$tag" ] && continue
          gh release delete "$tag" --repo "${{ github.repository }}" --yes --cleanup-tag
        done < <(gh release list --repo "${{ github.repository }}" --limit 200 --json tagName,isDraft \
          --jq -r '[.[] | select(.isDraft == false)] | .[3:] | .[].tagName')
